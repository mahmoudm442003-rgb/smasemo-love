<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ سماسيمو ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(135deg,#ffd6e8,#fff0f7,#ffd6ef);
min-height:100vh;
overflow-x:hidden;
color:#c2185b;
}

.login{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.login h1{
font-size:40px;
margin-bottom:25px;
}

input{
width:280px;
padding:15px;
border:none;
border-radius:30px;
font-size:18px;
text-align:center;
outline:none;
}

button{
margin-top:20px;
padding:14px 35px;
border:none;
border-radius:30px;
background:#ff4f8b;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
background:#ff2d74;
}

#site{
display:none;
padding:20px;
text-align:center;
animation:fade .8s;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

.title{
font-size:48px;
margin-top:20px;
text-shadow:0 0 15px pink;
}

.counter{
margin:20px 0;
font-size:22px;
font-weight:bold;
}

.envelope{
width:220px;
height:140px;
background:#ff82b2;
margin:40px auto;
border-radius:12px;
position:relative;
cursor:pointer;
transition:.4s;
}

.envelope:hover{
transform:scale(1.05);
}

.envelope:before{
content:"";
position:absolute;
left:0;
top:0;
border-left:110px solid transparent;
border-right:110px solid transparent;
border-top:70px solid #ffb6d3;
}

.letter{
display:none;
max-width:800px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 0 25px rgba(0,0,0,.2);
font-size:20px;
line-height:2;
white-space:pre-line;
}.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:15px;
margin-top:40px;
}

.gallery img{
width:100%;
border-radius:20px;
cursor:pointer;
transition:.3s;
box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.gallery img:hover{
transform:scale(1.05);
}

.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
justify-content:center;
align-items:center;
z-index:999;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:20px;
}

</style>
</head>

<body>

<div class="login" id="login">

<h1>❤️ Welcome Smasemo ❤️</h1>

<input
id="pass"
type="password"
placeholder="اكتبي كلمة السر">

<button onclick="login()">
دخول ❤️
</button>

</div>

<div id="site">

<h1 class="title">
❤️ سماسيمو ❤️
</h1>

<div id="counter" class="counter"></div>

<div class="envelope" onclick="openLetter()"></div>

<div class="letter" id="letter">

أنا بحبك أوي يا سماسيمو ❤️

كل يوم بوجودك بحس إن حياتي أحلى...

شكراً إنك في حياتي.

ووعد مني...
أفضل أحبك وأحافظ عليكي وأكون جنبك دايمًا.

بحبك جدًا ❤️

</div><div style="margin:35px 0;">

<button onclick="window.open('https://youtu.be/LcOGDtgOuOM?si=R-LknJzmJjgyziPE','_blank')">

🎵 شغلي أغنيتنا ❤️

</button>

</div>

<h2 style="margin:40px 0 20px;">
📸 ذكرياتنا ❤️
</h2>

<div class="gallery">

<img src="IMG-20260627-WA0205.jpg" onclick="showImage(this.src)">

<img src="IMG-20260627-WA0214.jpg" onclick="showImage(this.src)">

<img src="IMG-20260627-WA0233.jpg" onclick="showImage(this.src)">

<img src="IMG20260626231616.jpg" onclick="showImage(this.src)">

<img src="IMG_20260626_233444_690.jpg" onclick="showImage(this.src)">

<img src="IMG_2931.jpg" onclick="showImage(this.src)">

</div>

<div class="lightbox" id="lightbox" onclick="closeImage()">

<img id="bigImage">

</div>

<script>

function login(){

if(document.getElementById("pass").value==="Smasemo"){

document.getElementById("login").style.display="none";

document.getElementById("site").style.display="block";

updateCounter();

setInterval(updateCounter,1000);

}else{

alert("🤭 دي مش كلمة سماسيمو 💖");

}

}

function openLetter(){const startDate = new Date("2026-06-23T23:14:00");

function updateCounter(){

const now = new Date();

const diff = now - startDate;

if(diff < 0){

document.getElementById("counter").innerHTML =
"❤️ باقي على بداية حكايتنا ❤️";

return;

}

const days = Math.floor(diff/(1000*60*60*24));

const hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));

const minutes = Math.floor((diff%(1000*60*60))/(1000*60));

const seconds = Math.floor((diff%(1000*60))/1000);

document.getElementById("counter").innerHTML =
`❤️ ${days} يوم | ${hours} ساعة | ${minutes} دقيقة | ${seconds} ثانية ❤️`;

}

function showImage(src){

document.getElementById("lightbox").style.display="flex";

document.getElementById("bigImage").src=src;

}

function closeImage(){

document.getElementById("lightbox").style.display="none";

}

</script>

</body>

</html>

document.getElementById("letter").style.display="block";

}
